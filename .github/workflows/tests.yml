name: tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      JARVIS_SKIP_MCP: "1"        # no arranca servers MCP en CI (tests deterministas)
      QT_QPA_PLATFORM: offscreen  # Qt headless

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Libs de sistema para Qt headless + audio (PortAudio). En Ubuntu 24.04 algunos
      # paquetes llevan sufijo t64; si la primera corrida falla acá, ajustá los nombres.
      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libnss3 \
            libportaudio2 libasound2t64 || \
          sudo apt-get install -y --no-install-recommends libasound2

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Pytest (suite de regresión)
        run: pytest -q

      - name: Smoke test
        run: python smoke_test.py
