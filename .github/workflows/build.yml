name: build-installers

# Compila JARVIS en las 3 plataformas y sube los artefactos (.dmg / .exe / tar.gz).
# Disparalo a mano (Actions → build-installers → Run) o pusheando un tag v*.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: System deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libnss3 \
            libportaudio2 libasound2t64 || sudo apt-get install -y libasound2

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Freeze (PyInstaller)
        run: pyinstaller build.spec --noconfirm --clean

      - name: Package — macOS (.dmg)
        if: runner.os == 'macOS'
        run: hdiutil create -volname JARVIS -srcfolder dist/JARVIS.app -ov -format UDZO JARVIS.dmg

      - name: Package — Linux (tar.gz)
        if: runner.os == 'Linux'
        run: tar -czf JARVIS-linux.tar.gz -C dist JARVIS

      # En Windows el artefacto es la carpeta dist/JARVIS con JARVIS.exe adentro.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-${{ runner.os }}
          path: |
            JARVIS.dmg
            JARVIS-linux.tar.gz
            dist/JARVIS
          if-no-files-found: ignore
